dataset:
  downsample_freq: w
  name: wti
  sample_entities: 1
drift:
  detector: ks_test
  detector_params: {}
  enabled: true
  'on': residual
metrics:
- mae
- rmse
- smape
model:
  name: seasonal_naive
  params:
    random_state: 42
output:
  results_dir: results/wti/adaptive_retrain/seasonal_naive
  save_metrics: true
  save_predictions: false
  save_window_metrics: false
retraining:
  consecutive_decay_rate: 0.5
  decay_consecutive: true
  drift_threshold: 0.5
  enabled: true
  min_steps_between_retrain: 3
  policy: drift_triggered
  require_consecutive: 2
seed: 42
simulation:
  forecast_horizon_hours: 168
  history_window_days: 60
  step_size_hours: 168
