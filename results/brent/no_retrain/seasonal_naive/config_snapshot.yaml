dataset:
  downsample_freq: w
  name: brent
  sample_entities: 1
drift:
  enabled: false
metrics:
- mae
- rmse
- smape
model:
  name: seasonal_naive
  params:
    random_state: 42
    season_length: 24
output:
  results_dir: results/brent/no_retrain/seasonal_naive
  save_metrics: true
  save_predictions: false
  save_window_metrics: true
retraining:
  enabled: true
  min_steps_between_retrain: 999999
  policy: no_retraining
seed: 42
simulation:
  forecast_horizon_hours: 168
  history_window_days: 60
  step_size_hours: 168
