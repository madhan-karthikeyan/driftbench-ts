dataset:
  downsample_freq: h
  name: electricity
  sample_entities: 5
drift:
  enabled: false
metrics:
- mae
- rmse
- smape
model:
  name: rf
  params:
    max_depth: 8
    n_estimators: 50
    n_lags: 3
    random_state: 42
output:
  results_dir: results/electricity/adaptive_retrain/rf
  save_metrics: true
  save_predictions: false
  save_window_metrics: true
retraining:
  consecutive_decay_rate: 0.5
  decay_consecutive: true
  drift_threshold: 0.5
  enabled: true
  min_steps_between_retrain: 3
  policy: drift_triggered
  require_consecutive: 2
seed: 42
simulation:
  forecast_horizon_hours: 24
  history_window_days: 30
  step_size_hours: 24
