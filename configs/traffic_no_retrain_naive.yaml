dataset:
  downsample_freq: h
  name: traffic
  sample_entities: 1
drift:
  enabled: false
metrics:
- mae
- rmse
- smape
model:
  name: naive
  params: {}
output:
  results_dir: results/traffic/no_retrain/naive
  save_metrics: true
  save_predictions: false
  save_window_metrics: true
retraining:
  enabled: true
  min_steps_between_retrain: 999999
  policy: no_retraining
seed: 42
simulation:
  forecast_horizon_hours: 24
  history_window_days: 30
  step_size_hours: 24
