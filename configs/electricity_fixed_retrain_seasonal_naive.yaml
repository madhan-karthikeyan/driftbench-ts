dataset:
  downsample_freq: h
  name: electricity
  sample_entities: 5
drift:
  enabled: false
metrics:
- mae
- rmse
- smape
model:
  name: seasonal_naive
  params:
    season_length: 24
output:
  results_dir: results/electricity/fixed_retrain/seasonal_naive
  save_metrics: true
  save_predictions: false
  save_window_metrics: true
retraining:
  enabled: true
  min_steps_between_retrain: 1
  policy: fixed_schedule
  retrain_every_n_steps: 10
seed: 42
simulation:
  forecast_horizon_hours: 24
  history_window_days: 30
  step_size_hours: 24
